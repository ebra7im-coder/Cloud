name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ============================================================
  # ANDROID APK  ✅
  # ============================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build APK
        run: flutter build apk --release --split-per-abi

      - name: build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ============================================================
  # iOS  ✅
  # ============================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: pod install
        run: |
          cd ios && rm -f Podfile.lock
          pod install --repo-update 2>&1 || true

      - name: build iOS simulator debug
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      - name: build iOS device best-effort
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" || true

      - name: package IPA
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload && cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/ && rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # WINDOWS EXE
  #
  # Problem: Flutter 3.27.4 visual_studio.dart maps only VS 17
  # to "Visual Studio 17 2022". VS 18 (2025) on windows-latest
  # falls back to "Visual Studio 16 2019" which doesn't exist.
  # Also, Flutter passes "-A x64" which Ninja doesn't support.
  #
  # Final solution: patch the flutter_tools dart SOURCE files
  # (visual_studio.dart + build_windows.dart) then delete the
  # pre-compiled snapshot so Flutter re-compiles from source on
  # first run. This is clean, version-independent, and works
  # with any VS version on the runner.
  # ============================================================
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        shell: pwsh
        run: New-Item -Force -ItemType Directory assets\icons, assets\images | Out-Null

      - name: setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Patch flutter_tools dart source, then delete snapshot to force recompile
      - name: patch flutter_tools source for VS2025 + Ninja
        shell: pwsh
        run: |
          $toolsLib = "$env:FLUTTER_ROOT\packages\flutter_tools\lib\src\windows"
          Write-Host "Patching: $toolsLib"

          # 1. visual_studio.dart: add VS 18 mapping
          $vsFile = "$toolsLib\visual_studio.dart"
          $content = Get-Content $vsFile -Raw -Encoding UTF8
          # Add "18 => 'Visual Studio 18 2025'," before the default case
          $content = $content -replace "(_  => 'Visual Studio 16 2019')", "18 => 'Visual Studio 18 2025',`n      _  => 'Visual Studio 16 2019'"
          # Also support any unknown version -> use Ninja as fallback
          $content = $content -replace "_  => 'Visual Studio 16 2019'", "_  => 'Ninja'"
          Set-Content $vsFile $content -Encoding UTF8 -NoNewline
          Write-Host "Patched visual_studio.dart"

          # 2. build_windows.dart: remove '-A' and getCmakeWindowsArch() lines
          $buildFile = "$toolsLib\build_windows.dart"
          $content = Get-Content $buildFile -Raw -Encoding UTF8
          # Remove the two lines that add -A and x64 to cmake args
          $content = $content -replace "        '-A',\r?\n        getCmakeWindowsArch\(targetPlatform\),\r?\n", ""
          $content = $content -replace "        '-A',\n        getCmakeWindowsArch\(targetPlatform\),\n", ""
          Set-Content $buildFile $content -Encoding UTF8 -NoNewline
          Write-Host "Patched build_windows.dart"

          # 3. Delete pre-compiled snapshot to force recompilation from patched source
          $snapshot = "$env:FLUTTER_ROOT\bin\cache\flutter_tools.snapshot"
          if (Test-Path $snapshot) {
            Remove-Item $snapshot -Force
            Write-Host "Deleted snapshot -> Flutter will recompile from source"
          }

          # Verify patches
          Write-Host "--- visual_studio.dart cmakeGenerator ---"
          Select-String -Path $vsFile -Pattern "Visual Studio|Ninja" | ForEach-Object { Write-Host $_.Line }
          Write-Host "--- build_windows.dart around -A ---"
          $lines = Get-Content $buildFile
          $idx = ($lines | Select-String "-A").LineNumber
          if ($idx) { $lines[($idx-3)..($idx+3)] | ForEach-Object { Write-Host $_ } }

      - name: build Windows EXE (with recompiled flutter_tools)
        shell: pwsh
        run: flutter build windows --release

      - name: zip output
        shell: pwsh
        run: |
          $src = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          Write-Host "Zipping: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force
          Write-Host "$([math]::Round((Get-Item 'CloudGram-Windows.zip').Length/1MB,1)) MB"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: compute tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: list artifacts
        run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            | المنصة | الملف |
            |--------|-------|
            | 🤖 Android | app-arm64-v8a-release.apk |
            | 🍎 iOS Simulator | CloudGram-iOS-Simulator.zip |
            | 🍎 iOS Device | CloudGram-iOS-Device.ipa |
            | 🪟 Windows | CloudGram-Windows.zip |

            > Flutter 3.27.4 — GitHub Actions
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
