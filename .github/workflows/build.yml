name: 🚀 CloudGram Build (APK • iOS • Windows EXE)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

# ══════════════════════════════════════════════════════════════════
# 1️⃣  ANDROID APK
# ══════════════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: 📦 pub get
        run: flutter pub get

      - name: 📝 local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"    > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"   >> android/local.properties

      - name: 🔨 Build APK
        run: flutter build apk --release --split-per-abi

      - name: 🔨 Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

# ══════════════════════════════════════════════════════════════════
# 2️⃣  iOS — xcodebuild archive (لا يحتاج Apple account)
# ══════════════════════════════════════════════════════════════════
  build-ios:
    name: 🍎 iOS Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: 📦 pub get
        run: flutter pub get

      - name: 🔧 pod install
        run: |
          cd ios
          pod install --repo-update
        continue-on-error: true

      # بناء debug على simulator — لا يحتاج codesigning إطلاقاً
      - name: 🔨 Build iOS Simulator (debug, no-codesign)
        run: flutter build ios --simulator --debug --no-codesign

      - name: 📦 Zip Simulator .app
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../CloudGram-iOS-Simulator.zip Runner.app
          echo "Size: $(du -sh ../../../CloudGram-iOS-Simulator.zip)"

      # محاولة بناء device archive — بدون signing identity (best-effort)
      - name: 🔨 Build iOS Device archive (no-codesign, best-effort)
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

      - name: 📦 Package Device IPA (if available)
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/
            rm -rf Payload
            echo "IPA size: $(du -sh CloudGram-iOS-Device.ipa)"
          else
            echo "Device build not produced — skipping IPA packaging"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

# ══════════════════════════════════════════════════════════════════
# 3️⃣  WINDOWS EXE — إجبار Flutter على استخدام Ninja بدلاً من VS
# ══════════════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: 🔧 Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: 📦 pub get
        run: flutter pub get

      # تثبيت Ninja مباشرة — يتجاوز مشكلة VS generator
      - name: 🔧 Install Ninja
        run: choco install ninja -y --no-progress
        shell: pwsh

      # إضافة cmake من VS 2022 للـ PATH
      - name: 🔧 Add VS 2022 CMake to PATH
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vsWhere -latest -property installationPath 2>$null
          if (-not $vsPath) {
            # fallback: search common paths
            $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
            if (-not (Test-Path $vsPath)) {
              $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Community"
            }
            if (-not (Test-Path $vsPath)) {
              $vsPath = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -ErrorAction SilentlyContinue | Select-Object -Last 1).FullName + "\Enterprise"
            }
          }
          Write-Host "VS path: $vsPath"
          $cmakeBin = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin"
          if (Test-Path $cmakeBin) {
            echo "$cmakeBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Added CMake: $cmakeBin"
          }
          # Verify cmake & ninja
          cmake --version
          ninja --version

      # إجبار Flutter على استخدام Ninja generator عبر متغير البيئة
      - name: 🔨 Build Windows EXE
        shell: pwsh
        env:
          CMAKE_GENERATOR: Ninja
        run: flutter build windows --release --verbose

      - name: 📦 Zip output
        shell: pwsh
        run: |
          $paths = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          )
          $src = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          Write-Host "Zipping: $src"
          Get-ChildItem $src
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: CloudGram-Windows.zip
          retention-days: 30

# ══════════════════════════════════════════════════════════════════
# 4️⃣  RELEASE
# ══════════════════════════════════════════════════════════════════
  release:
    name: 🏷️ GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 🏷️ Tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG="v${VER}-$(date +%Y%m%d%H%M%S)"
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"  >> $GITHUB_OUTPUT

      - name: 🗂 List artifacts
        run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "☁️ CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## ☁️ CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            | المنصة | الملف | ملاحظة |
            |--------|-------|--------|
            | 🤖 Android | `app-arm64-v8a-release.apk` | ✅ موصى به للأجهزة الحديثة |
            | 🤖 Android | `app-armeabi-v7a-release.apk` | أجهزة قديمة |
            | 🍎 iOS Simulator | `CloudGram-iOS-Simulator.zip` | للمحاكي |
            | 🍎 iOS Device | `CloudGram-iOS-Device.ipa` | AltStore / Sideloadly |
            | 🪟 Windows | `CloudGram-Windows.zip` | فك الضغط ثم شغّل cloudgram.exe |

            > 🤖 بُني تلقائياً بواسطة GitHub Actions
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
