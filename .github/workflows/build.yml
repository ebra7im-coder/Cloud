name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ============================================================
  # ANDROID APK  ✅
  # ============================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build APK
        run: flutter build apk --release --split-per-abi

      - name: build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ============================================================
  # iOS  ✅
  # ============================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: pod install
        run: |
          cd ios && rm -f Podfile.lock
          pod install --repo-update 2>&1 || true

      - name: build iOS simulator debug
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      - name: build iOS device best-effort
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" || true

      - name: package IPA
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload && cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/ && rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # WINDOWS EXE — Final approach:
  # Use flutter build windows but intercept cmake call.
  # Steps:
  # 1. flutter create --platforms=windows  (proper CMake files)
  # 2. flutter precache --windows          (download engine DLLs)
  # 3. Manually copy engine to ephemeral/  (ensure .lib exists)
  # 4. Patch flutter_tools dart source     (Ninja generator, no -A)
  # 5. Delete snapshot + .dart_tool        (force JIT from source)
  # 6. flutter build windows --release    (JIT recompile + build)
  # ============================================================
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        shell: pwsh
        run: New-Item -Force -ItemType Directory assets\icons, assets\images | Out-Null

      - name: setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: full windows build setup
        shell: pwsh
        run: |
          # ── Step 1: generate windows/ via flutter create ──────────────────
          flutter create --platforms=windows --org com.cloudgram . 2>&1 |
            Where-Object { $_ -match 'windows' } | Write-Host
          Write-Host "Created windows/ directory"

          # ── Step 2: precache engine ───────────────────────────────────────
          flutter precache --windows
          Write-Host "Engine precached"

          # ── Step 3: manually copy engine files to ephemeral/ ─────────────
          $ephemeral = "windows\flutter\ephemeral"
          New-Item -Force -ItemType Directory $ephemeral | Out-Null

          $engineDirs = @(
            "$env:FLUTTER_ROOT\bin\cache\artifacts\engine\windows-x64-release",
            "$env:FLUTTER_ROOT\bin\cache\artifacts\engine\windows-x64",
            "$env:FLUTTER_ROOT\bin\cache\artifacts\engine\windows-release"
          )
          foreach ($dir in $engineDirs) {
            if (Test-Path $dir) {
              Copy-Item "$dir\*" $ephemeral -Force -ErrorAction SilentlyContinue
              Write-Host "Copied from: $dir"
              break
            }
          }

          # Run flutter pub get after create to generate ephemeral plugin symlinks
          flutter pub get
          Write-Host "Plugin symlinks generated"

          # Write generated_config.cmake correctly (no quoted cmake strings)
          $flutterRoot = $env:FLUTTER_ROOT -replace "\\", "/"
          $projDir = (Get-Location).Path -replace "\\", "/"
          $outDir = "$projDir/build"
          $dataDir = "$outDir/flutter_assets"
          $lines = @(
            "# Generated by CloudGram CI",
            "file(TO_CMAKE_PATH `"$flutterRoot`" FLUTTER_ROOT)",
            "file(TO_CMAKE_PATH `"$projDir`" PROJECT_DIR)",
            "set(FLUTTER_TARGET_PLATFORM windows-x64)",
            "set(FLUTTER_TARGET lib/main.dart)",
            "set(FLUTTER_BUILD_MODE release)",
            "set(FLUTTER_BUILD_NUMBER 1)",
            "set(FLUTTER_BUILD_NAME 1.0.0)"
          )
          Set-Content "$ephemeral\generated_config.cmake" $lines -Encoding UTF8
          Write-Host "generated_config.cmake written (no quoted cmake vars)"

          # Fix flutter/CMakeLists.txt: the apply_standard_settings macro
          # passes warning flags with quotes e.g. /wd"4100" which MSVC rejects.
          # Patch it to use the correct format /wd4100 (no quotes around number)
          $flutterCmake = "windows\flutter\CMakeLists.txt"
          if (Test-Path $flutterCmake) {
            $fc = Get-Content $flutterCmake -Raw -Encoding UTF8
            # Fix quoted warning numbers: /wd"NNNN" -> /wd NNNN
            $fc = $fc -replace '/wd\"(\d+)\"', '/wd$1'
            $fc = $fc -replace "/wd`"(\d+)`"", '/wd$1'
            Set-Content $flutterCmake $fc -Encoding UTF8 -NoNewline
            Write-Host "Patched flutter/CMakeLists.txt warning flags"
          } else {
            Write-Host "flutter/CMakeLists.txt not found yet (will be created by flutter)"
          }

          # Verify lib file
          if (Test-Path "$ephemeral\flutter_windows.dll.lib") {
            Write-Host "flutter_windows.dll.lib: FOUND ✅"
          } else {
            Write-Host "flutter_windows.dll.lib: NOT FOUND - listing ephemeral:"
            Get-ChildItem $ephemeral | Select-Object Name
          }

          # ── Step 4: patch dart source for Ninja + VS2025 ─────────────────
          $toolsLib = "$env:FLUTTER_ROOT\packages\flutter_tools\lib\src\windows"

          # visual_studio.dart: fallback to Ninja for unknown VS versions
          $vsFile = "$toolsLib\visual_studio.dart"
          $c = Get-Content $vsFile -Raw -Encoding UTF8
          $c = $c -replace "_  => 'Visual Studio 16 2019'", "_  => 'Ninja'"
          Set-Content $vsFile $c -Encoding UTF8 -NoNewline
          Write-Host "Patched visual_studio.dart"

          # build_windows.dart: remove -A/arch args and INSTALL target
          $buildFile = "$toolsLib\build_windows.dart"
          $lines = Get-Content $buildFile
          $out = [System.Collections.Generic.List[string]]::new()
          $skip = $false
          foreach ($line in $lines) {
            if ($line.TrimEnd() -eq "        '-A',") { $skip = $true; continue }
            if ($skip -and $line.TrimEnd() -match "getCmakeWindowsArch") { $skip = $false; continue }
            if ($line.TrimEnd() -eq "          ...<String>['--target', 'INSTALL'],") { continue }
            $out.Add($line)
          }
          Set-Content $buildFile $out -Encoding UTF8
          Write-Host "Patched build_windows.dart"

          # ── Step 5: wipe cached snapshot + dart kernel ────────────────────
          $toDelete = @(
            "$env:FLUTTER_ROOT\bin\cache\flutter_tools.snapshot",
            "$env:FLUTTER_ROOT\bin\cache\flutter_tools.stamp",
            "$env:FLUTTER_ROOT\packages\flutter_tools\.dart_tool"
          )
          foreach ($p in $toDelete) {
            if (Test-Path $p) { Remove-Item $p -Recurse -Force; Write-Host "Deleted: $p" }
          }
          Write-Host "Cache cleared — Flutter will JIT from patched source"

      - name: cmake configure and ninja build
        shell: pwsh
        run: |
          $vsPath = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          $cmake = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe"
          $ninja = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja\ninja.exe"
          $ninjaDir = [System.IO.Path]::GetDirectoryName($ninja)
          $env:PATH = "$ninjaDir;$env:PATH"

          Write-Host "cmake: $cmake"
          Write-Host "ninja: $ninja"

          # Run cmake configure
          $buildDir = "build\windows\x64"
          New-Item -Force -ItemType Directory $buildDir | Out-Null
          & $cmake -S windows -B $buildDir -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DFLUTTER_TARGET_PLATFORM=windows-x64 `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_MAKE_PROGRAM="$ninja"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "cmake configure failed (exit $LASTEXITCODE)"
            exit 1
          }
          Write-Host "cmake configure OK"

          # Patch ALL build.ninja files: fix /wd"4100" -> /wd4100
          $ninjaFiles = Get-ChildItem -Recurse $buildDir -Filter "*.ninja"
          foreach ($f in $ninjaFiles) {
            $txt = Get-Content $f.FullName -Raw -Encoding UTF8
            if ($txt -match '/wd\"') {
              $patched = $txt -replace '/wd\"(\d+)\"', '/wd$1'
              Set-Content $f.FullName $patched -Encoding UTF8 -NoNewline
              Write-Host "Patched: $($f.Name)"
            }
          }

          # Ninja build
          Push-Location $buildDir
          & $ninja -j 4
          $exitCode = $LASTEXITCODE
          Pop-Location
          if ($exitCode -ne 0) { Write-Error "ninja build failed"; exit 1 }
          Write-Host "Build successful!"

      - name: zip output
        shell: pwsh
        run: |
          $src = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          Write-Host "Zipping: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force
          Write-Host "$([math]::Round((Get-Item 'CloudGram-Windows.zip').Length/1MB,1)) MB"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
      - run: find artifacts/ -type f | sort
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            | المنصة | الملف |
            |--------|-------|
            | 🤖 Android | app-arm64-v8a-release.apk |
            | 🍎 iOS | CloudGram-iOS-Simulator.zip / CloudGram-iOS-Device.ipa |
            | 🪟 Windows | CloudGram-Windows.zip |
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
