name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ================================================================
  # ANDROID APK
  # ================================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build apk
        run: flutter build apk --release --split-per-abi

      - name: build aab
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ================================================================
  # iOS
  # wakelock_plus fix: dependency_overrides in pubspec forces >=1.4.0
  # ================================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: pod install
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update 2>&1 || true

      - name: build ios simulator debug
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      - name: build ios device best-effort
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

      - name: package ipa if available
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/
            rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ================================================================
  # WINDOWS EXE
  # Fix: vswhere_wrapper.cs compiled and replaces vswhere.exe
  # Reports VS2022 as VS2019 to fool Flutter 3.22 tooling
  # ================================================================
  windows:
    name: Windows EXE
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        run: flutter pub get

      - name: setup msvc x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: install ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: patch vswhere to accept VS2022
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vsWhere -latest -property installationPath
          Write-Host "VS path: $vsPath"

          # Add VS cmake and ninja to PATH
          $cmakeBin = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin"
          $ninjaBin  = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja"
          Write-Host "cmake: $cmakeBin"
          Write-Host "ninja: $ninjaBin"
          echo "$cmakeBin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$ninjaBin"  | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

          # Backup real vswhere as .orig (wrapper will call it)
          $origPath = $vsWhere + ".orig"
          Copy-Item -Force $vsWhere $origPath
          Write-Host "Backed up to: $origPath"

          # Compile our C# wrapper from the repo script
          $csc = (Get-ChildItem "C:\Windows\Microsoft.NET\Framework64" -Filter "csc.exe" -Recurse |
                  Sort-Object FullName -Descending | Select-Object -First 1).FullName
          Write-Host "Using csc: $csc"

          $wrapperExe = "$env:TEMP\vswhere_wrapper.exe"
          & $csc /out:"$wrapperExe" scripts\vswhere_wrapper.cs /nologo
          if (-not (Test-Path $wrapperExe)) { Write-Error "Compile failed"; exit 1 }

          # Replace vswhere.exe with our wrapper
          Copy-Item -Force $wrapperExe $vsWhere
          Write-Host "vswhere.exe replaced with wrapper"

          # Verify: wrapper should report version 16.x
          $reported = & $vsWhere -format json -latest 2>$null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['installationVersion'] if d else 'none')"
          Write-Host "Reported version: $reported"

          cmake --version
          ninja --version

      - name: build windows
        shell: pwsh
        run: flutter build windows --release

      - name: zip output
        shell: pwsh
        run: |
          $src = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          Write-Host "Zipping: $src"
          Get-ChildItem $src | Select-Object Name
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ================================================================
  # RELEASE
  # ================================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — Unlimited Cloud Storage via Telegram

            | Platform | File |
            |----------|------|
            | Android | app-arm64-v8a-release.apk |
            | iOS Simulator | CloudGram-iOS-Simulator.zip |
            | iOS Device | CloudGram-iOS-Device.ipa |
            | Windows | CloudGram-Windows.zip |
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
