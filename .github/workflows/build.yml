name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Flutter 3.27.4 on stable channel:
#   - Supports VS2022 natively (vswhere -version 17)
#   - Ships meta >=1.15 (wakelock_plus_platform_interface compatible)
#   - CardTheme (not CardThemeData), Color.withValues() available
#   All 3 root causes resolved by upgrading Flutter.

jobs:

  # ============================================================
  # ANDROID
  # ============================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build APK
        run: flutter build apk --release --split-per-abi

      - name: build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ============================================================
  # iOS
  # ============================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: pod install
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update 2>&1 || true

      - name: build iOS simulator (debug)
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      - name: build iOS device (best-effort, no codesign)
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

      - name: package IPA if available
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/
            rm -rf Payload
            echo "IPA packaged: $(du -sh CloudGram-iOS-Device.ipa)"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # WINDOWS EXE
  # Flutter 3.27+ uses vswhere -version 17 (VS2022) natively
  # ============================================================
  windows:
    name: Windows EXE
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: flutter pub get
        run: flutter pub get

      - name: setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: build Windows EXE
        shell: pwsh
        run: flutter build windows --release

      - name: zip output
        shell: pwsh
        run: |
          $src = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          Write-Host "Zipping from: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force
          Write-Host "Done: $((Get-Item 'CloudGram-Windows.zip').Length / 1MB) MB"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: compute tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: list artifacts
        run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            | المنصة | الملف |
            |--------|-------|
            | 🤖 Android | `app-arm64-v8a-release.apk` ✅ موصى به |
            | 🤖 Android | `app-armeabi-v7a-release.apk` أجهزة قديمة |
            | 🍎 iOS Simulator | `CloudGram-iOS-Simulator.zip` |
            | 🍎 iOS Device | `CloudGram-iOS-Device.ipa` AltStore/Sideloadly |
            | 🪟 Windows | `CloudGram-Windows.zip` شغّل cloudgram.exe |

            > بُني تلقائياً بواسطة GitHub Actions — Flutter 3.27.4
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
