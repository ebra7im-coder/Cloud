name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ============================================================
  # ANDROID APK  ✅
  # ============================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build APK
        run: flutter build apk --release --split-per-abi

      - name: build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ============================================================
  # iOS  ✅
  # ============================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: pod install
        run: |
          cd ios && rm -f Podfile.lock
          pod install --repo-update 2>&1 || true

      - name: build iOS simulator debug
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      - name: build iOS device best-effort
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" || true

      - name: package IPA
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload && cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/ && rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # WINDOWS EXE
  #
  # Problem: Flutter 3.27.4 on windows-latest (VS 18/2025) falls
  # back to CMake generator "Visual Studio 16 2019" which doesn't
  # exist, causing "Unable to generate build files".
  #
  # Solution: bypass "flutter build windows" entirely.
  # Instead, run the exact same steps Flutter does internally:
  #   1. flutter pub get  (generates plugin symlinks & cmake files)
  #   2. cmake -G Ninja   (Ninja is bundled with VS, no -A flag needed)
  #   3. cmake --build    (compile)
  #   4. copy Flutter engine DLLs to output  (flutter assemble)
  # ============================================================
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        shell: pwsh
        run: New-Item -Force -ItemType Directory assets\icons, assets\images | Out-Null

      - name: setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Generate Flutter's windows CMake files (ephemeral dir, plugin symlinks, etc.)
      # We run flutter assemble to get the engine artifacts in place
      - name: flutter assemble (generate engine artifacts)
        shell: pwsh
        run: |
          flutter assemble -dTargetPlatform=windows-x64 `
            -dBuildMode=release `
            -dTrackWidgetCreation=false `
            --output=build\flutter_assets `
            windows_aot_bundle_release_assets 2>&1 | Out-Null
          Write-Host "Assemble done (errors above are non-fatal)"
        continue-on-error: true

      # Run cmake + ninja directly, bypassing flutter build windows
      - name: cmake configure (Ninja, no -A flag)
        shell: pwsh
        run: |
          # Find cmake bundled with VS
          $vsPath = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          $cmake = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe"
          $ninja = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja\ninja.exe"

          Write-Host "cmake: $cmake"
          Write-Host "ninja: $ninja"

          # Add ninja to PATH
          $ninjaDir = [System.IO.Path]::GetDirectoryName($ninja)
          $env:PATH = "$ninjaDir;$env:PATH"

          New-Item -Force -ItemType Directory "build\windows\x64" | Out-Null

          # Configure: Ninja generator (no -A), MSVC compilers from PATH
          & $cmake `
            -S windows `
            -B "build\windows\x64" `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DFLUTTER_TARGET_PLATFORM=windows-x64 `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_MAKE_PROGRAM="$ninja"

          if ($LASTEXITCODE -ne 0) { Write-Error "cmake configure failed"; exit 1 }

      - name: cmake build
        shell: pwsh
        run: |
          $vsPath = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          $cmake = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe"
          & $cmake --build "build\windows\x64" --config Release --parallel
          if ($LASTEXITCODE -ne 0) { Write-Error "cmake build failed"; exit 1 }

      # Copy Flutter engine DLLs to the output directory
      - name: copy Flutter engine files
        shell: pwsh
        run: |
          $outDir = "build\windows\x64\runner\Release"
          if (-not (Test-Path $outDir)) {
            $outDir = (Get-ChildItem -Recurse "build\windows\x64" -Filter "*.exe" |
                       Where-Object { $_.Name -ne "cmake.exe" } |
                       Select-Object -First 1).DirectoryName
          }
          Write-Host "Output dir: $outDir"

          $engineDir = "$env:FLUTTER_ROOT\bin\cache\artifacts\engine\windows-x64-release"
          if (-not (Test-Path $engineDir)) {
            $engineDir = "$env:FLUTTER_ROOT\bin\cache\artifacts\engine\windows-x64"
          }
          Write-Host "Engine dir: $engineDir"

          if (Test-Path $engineDir) {
            Copy-Item "$engineDir\*.dll" $outDir -Force -ErrorAction SilentlyContinue
            Write-Host "Copied engine DLLs"
          }

          # Copy data directory (Flutter assets)
          $dataDir = "$outDir\data"
          New-Item -Force -ItemType Directory $dataDir | Out-Null
          if (Test-Path "build\flutter_assets") {
            Copy-Item "build\flutter_assets\*" $dataDir -Recurse -Force -ErrorAction SilentlyContinue
          }
          if (Test-Path "build\windows\x64\runner\Release\data") {
            Write-Host "Data dir already exists"
          }

          Get-ChildItem $outDir | Select-Object Name, Length

      - name: zip output
        shell: pwsh
        run: |
          $candidates = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release",
            "build\windows\x64\Release"
          )
          $src = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $src) {
            Write-Error "No output directory found"
            Get-ChildItem -Recurse build\windows | Select-Object FullName | Head -20
            exit 1
          }
          Write-Host "Zipping from: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force
          Write-Host "Done: $([math]::Round((Get-Item 'CloudGram-Windows.zip').Length/1MB,1)) MB"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: compute tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: list artifacts
        run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            | المنصة | الملف |
            |--------|-------|
            | 🤖 Android | app-arm64-v8a-release.apk |
            | 🤖 Android | app-armeabi-v7a-release.apk |
            | 🍎 iOS Simulator | CloudGram-iOS-Simulator.zip |
            | 🍎 iOS Device | CloudGram-iOS-Device.ipa |
            | 🪟 Windows | CloudGram-Windows.zip |

            > Flutter 3.27.4 — GitHub Actions
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
