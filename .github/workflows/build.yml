name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ==============================================================
  # ANDROID APK
  # ==============================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build apk
        run: flutter build apk --release --split-per-abi

      - name: build aab
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ==============================================================
  # iOS
  # ==============================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      # حل مشكلة wakelock_plus: upgrade إلى إصدار يدعم Xcode الحديث
      - name: upgrade wakelock_plus
        run: |
          flutter pub upgrade wakelock_plus wakelock_plus_platform_interface || true

      - name: pod install
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update
        continue-on-error: true

      # بناء debug بدون codesign — الطريقة الوحيدة المضمونة بدون Apple account
      - name: build ios simulator debug
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      # محاولة device build — best effort
      - name: build ios device (best-effort)
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

      - name: package device ipa
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/
            rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ==============================================================
  # WINDOWS EXE
  # Flutter 3.22 calls vswhere -version 16 (VS2019 only).
  # Solution: patch the Flutter tool source to accept VS2022 (version 17)
  # ==============================================================
  windows:
    name: Windows EXE
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        run: flutter pub get

      - name: setup msvc
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # الحل الجذري: تعديل ملف Flutter tool الذي يحدد إصدار VS
      # Flutter يبحث عن VS16 (2019) فقط — نغير الرقم إلى 17 (2022)
      - name: patch flutter windows_utils.dart to accept VS2022
        shell: pwsh
        run: |
          $flutterRoot = $env:FLUTTER_ROOT
          Write-Host "Flutter root: $flutterRoot"

          # ابحث عن الملف الذي يحتوي على vswhere version 16
          $files = Get-ChildItem -Recurse "$flutterRoot\packages\flutter_tools\lib" `
            -Include "*.dart" -ErrorAction SilentlyContinue |
            Select-String "-version 16" | Select-Object -ExpandProperty Path -Unique

          Write-Host "Files with '-version 16': $($files -join ', ')"

          foreach ($file in $files) {
            Write-Host "Patching: $file"
            $content = Get-Content $file -Raw -Encoding UTF8
            # استبدال -version 16 بـ -version 17 حتى يقبل VS2022
            $patched = $content -replace '"-version", "16"', '"-version", "17"'
            $patched = $patched -replace "'-version', '16'", "'-version', '17'"
            # بعض الملفات تستخدم الصيغة المدمجة
            $patched = $patched -replace '-version 16', '-version 17'
            Set-Content $file $patched -Encoding UTF8
            Write-Host "Patched successfully"
          }

          # تحقق من التغيير
          Get-ChildItem -Recurse "$flutterRoot\packages\flutter_tools\lib" `
            -Include "*.dart" | Select-String "-version 1[67]" | Select-Object Line

      - name: build windows
        shell: pwsh
        run: flutter build windows --release --verbose

      - name: zip output
        shell: pwsh
        run: |
          $candidates = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release"
          )
          $src = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          Write-Host "Zipping: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ==============================================================
  # RELEASE
  # ==============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: compute tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: list artifacts
        run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — Unlimited Cloud Storage via Telegram

            | Platform | File | Note |
            |----------|------|------|
            | Android | app-arm64-v8a-release.apk | Recommended |
            | Android | app-armeabi-v7a-release.apk | Old devices |
            | iOS Simulator | CloudGram-iOS-Simulator.zip | Simulator only |
            | iOS Device | CloudGram-iOS-Device.ipa | AltStore/Sideloadly |
            | Windows | CloudGram-Windows.zip | Run cloudgram.exe |

            > Built automatically by GitHub Actions
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
