name: 🚀 CloudGram Build (APK • iOS • Windows EXE)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
jobs:

# ══════════════════════════════════════════════════════════════════════════════
# 1️⃣  ANDROID APK
# ══════════════════════════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🐦 Flutter 3.22.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: 📦 flutter pub get
        run: flutter pub get

      # كتابة local.properties يدوياً حتى يعرف Gradle مسار Flutter SDK
      - name: 📝 Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"  >> android/local.properties
          cat android/local.properties

      - name: 🔨 Build APK (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: 🔨 Build AAB
        run: flutter build appbundle --release

      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: 📊 Summary
        run: |
          echo "## ✅ Android" >> $GITHUB_STEP_SUMMARY
          echo "|File|Size|" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in build/app/outputs/flutter-apk/*.apk; do
            echo "|$(basename $f)|$(du -sh $f | cut -f1)|" >> $GITHUB_STEP_SUMMARY
          done

# ══════════════════════════════════════════════════════════════════════════════
# 2️⃣  iOS IPA  (Simulator build — no Apple Dev account needed)
# ══════════════════════════════════════════════════════════════════════════════
  build-ios:
    name: 🍎 iOS IPA
    runs-on: macos-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐦 Flutter 3.22.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: 📦 flutter pub get
        run: flutter pub get

      # ── بناء على Simulator (لا يحتاج Apple Developer Account) ──────────────
      - name: 🔨 Build iOS Simulator (no-codesign)
        run: |
          flutter build ios --simulator --release --no-codesign

      # ── تغليف مخرجات Simulator ─────────────────────────────────────────────
      - name: 📦 Package Simulator App (.app → zip)
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../CloudGram-iOS-Simulator.zip Runner.app
          cd ../../..
          echo "Simulator build size: $(du -sh CloudGram-iOS-Simulator.zip)"

      # ── محاولة بناء IPA حقيقي (قد يفشل بدون signing — نتجاهل الخطأ) ───────
      - name: 🔨 Build iOS Device (best-effort, no-codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=FLUTTER_BUILD_NUMBER=1 \
            --dart-define=FLUTTER_BUILD_NAME=1.0.0 || true

      - name: 📦 Package IPA (if device build succeeded)
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/
            rm -rf Payload
            echo "Device IPA created: $(du -sh CloudGram-iOS-Device.ipa)"
          else
            echo "Device build not available — uploading simulator build only."
          fi

      - name: 📤 Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

      - name: 📊 Summary
        run: |
          echo "## ✅ iOS" >> $GITHUB_STEP_SUMMARY
          echo "|File|Size|" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in CloudGram-iOS-*.zip CloudGram-iOS-*.ipa; do
            [ -f "$f" ] && echo "|$f|$(du -sh $f | cut -f1)|" >> $GITHUB_STEP_SUMMARY
          done

# ══════════════════════════════════════════════════════════════════════════════
# 3️⃣  WINDOWS EXE  (Visual Studio 2022 is pre-installed on windows-latest)
# ══════════════════════════════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows EXE
    runs-on: windows-latest   # VS 2022 مثبّت هنا افتراضياً

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐦 Flutter 3.22.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: 🔧 Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: 📦 flutter pub get
        run: flutter pub get

      # ── تأكد إن VS 2022 موجود وفعّل Ninja ──────────────────────────────────
      - name: 🔧 Setup Visual Studio environment
        uses: microsoft/setup-msbuild@v2

      - name: 🔧 Add cmake + ninja to PATH
        shell: pwsh
        run: |
          # cmake وninja موجودان مع VS 2022 — نضيفهم للـ PATH
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          Write-Host "VS path: $vsPath"
          $cmakePath = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin"
          $ninjaPath = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja"
          echo "$cmakePath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$ninjaPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          cmake --version
          ninja --version

      - name: 🔨 Build Windows EXE
        shell: pwsh
        run: flutter build windows --release

      - name: 📦 Zip Windows build
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-Not (Test-Path $src)) {
            $src = "build\windows\runner\Release"
          }
          Write-Host "Zipping from: $src"
          Get-ChildItem $src | Select-Object Name
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip"
          $size = [math]::Round((Get-Item "CloudGram-Windows.zip").Length/1MB, 1)
          Write-Host "ZIP size: ${size} MB"

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: CloudGram-Windows.zip
          retention-days: 30

      - name: 📊 Summary
        shell: pwsh
        run: |
          $size = [math]::Round((Get-Item "CloudGram-Windows.zip").Length/1MB,1)
          echo "## ✅ Windows" >> $env:GITHUB_STEP_SUMMARY
          echo "|File|Size|" >> $env:GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $env:GITHUB_STEP_SUMMARY
          echo "|CloudGram-Windows.zip|${size} MB|" >> $env:GITHUB_STEP_SUMMARY

# ══════════════════════════════════════════════════════════════════════════════
# 4️⃣  GITHUB RELEASE  (فقط عند push على main)
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: 🏷️ GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 🏷️ Compute tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG="v${VER}-$(date +%Y%m%d%H%M%S)"
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"  >> $GITHUB_OUTPUT

      - name: 🗂 List artifacts
        run: find artifacts/ -type f | sort

      - name: 🚀 Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "☁️ CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## ☁️ CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            ### 📥 ملفات التنزيل

            | المنصة | الملف | ملاحظة |
            |--------|-------|--------|
            | 🤖 Android | `app-arm64-v8a-release.apk` | أجهزة حديثة ✅ موصى به |
            | 🤖 Android | `app-armeabi-v7a-release.apk` | أجهزة قديمة |
            | 🤖 Android | `app-x86_64-release.apk` | محاكي |
            | 🍎 iOS Simulator | `CloudGram-iOS-Simulator.zip` | للمحاكي فقط |
            | 🍎 iOS Device | `CloudGram-iOS-Device.ipa` | يحتاج AltStore/Sideloadly |
            | 🪟 Windows | `CloudGram-Windows.zip` | فك الضغط ثم شغّل cloudgram.exe |

            ### ✨ المميزات
            - ☁️ تخزين لا محدود عبر Telegram Bot API
            - 📤 رفع صور، فيديو، موسيقى، مستندات
            - 🎥 مشغّل وسائط مدمج
            - 🔍 بحث وتنظيم بالمجلدات
            - 🌙 Dark Theme

            ---
            > 🤖 GitHub Actions — بُني تلقائياً
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
