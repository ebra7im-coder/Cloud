name: 🚀 CloudGram Build (APK • iOS • Windows EXE)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

# ─────────────────────────────────────────────────────────────────
# 1️⃣  Android APK
# ─────────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🔨 Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: 🔨 Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: 📢 APK build summary
        run: |
          echo "## ✅ Android Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in build/app/outputs/flutter-apk/*.apk; do
            echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done

# ─────────────────────────────────────────────────────────────────
# 2️⃣  iOS IPA
# ─────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Flutter create iOS (generate missing files)
        run: |
          flutter create --platforms=ios --org com.cloudgram . || true
          ls ios/Runner.xcodeproj/

      - name: 🔧 Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
        continue-on-error: true

      - name: 🔨 Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: 📦 Package IPA (unsigned)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r CloudGram-iOS.ipa Payload/
          rm -rf Payload

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: CloudGram-iOS.ipa
          retention-days: 30

      - name: 📢 iOS build summary
        run: |
          echo "## ✅ iOS Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| CloudGram-iOS.ipa | $(du -sh CloudGram-iOS.ipa | cut -f1) |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────
# 3️⃣  Windows EXE
# ─────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: 🔧 Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Flutter create Windows (generate missing platform files)
        run: flutter create --platforms=windows --org com.cloudgram . 2>&1 || true

      - name: 🔨 Build Windows EXE
        run: flutter build windows --release

      - name: 📦 Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "CloudGram-Windows.zip"

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: CloudGram-Windows.zip
          retention-days: 30

      - name: 📢 Windows build summary
        shell: pwsh
        run: |
          $size = [math]::Round((Get-Item "CloudGram-Windows.zip").Length / 1MB, 1)
          echo "## ✅ Windows Build Successful" >> $env:GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $env:GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| CloudGram-Windows.zip | ${size} MB |" >> $env:GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────
# 4️⃣  Auto GitHub Release
# ─────────────────────────────────────────────────────────────────
  release:
    name: 🏷️ Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 🏷️ Get version & tag
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG="v${VERSION}-$(date +%Y%m%d%H%M%S)"
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"          >> $GITHUB_OUTPUT

      - name: 🗂 List artifacts
        run: find artifacts/ -type f | sort

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "☁️ CloudGram ${{ steps.version.outputs.version }}"
          body: |
            ## ☁️ CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            ### 📥 ملفات التنزيل

            | المنصة | الملف | الوصف |
            |--------|-------|-------|
            | 🤖 Android | `app-arm64-v8a-release.apk` | أجهزة حديثة (موصى به) |
            | 🤖 Android | `app-armeabi-v7a-release.apk` | أجهزة قديمة |
            | 🤖 Android | `app-x86_64-release.apk` | محاكي |
            | 🍎 iOS | `CloudGram-iOS.ipa` | يحتاج AltStore أو Sideloadly |
            | 🪟 Windows | `CloudGram-Windows.zip` | فك الضغط وشغّل |

            ### ✨ المميزات
            - ☁️ تخزين لا محدود عبر Telegram Bot API
            - 📤 رفع صور، فيديو، موسيقى، ومستندات
            - 🎥 مشغّل فيديو وموسيقى مدمج
            - 🔍 بحث سريع وتنظيم بالمجلدات
            - 🌙 Dark Theme بتصميم Telegram

            ---
            > 🤖 تم البناء تلقائياً بواسطة GitHub Actions
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
