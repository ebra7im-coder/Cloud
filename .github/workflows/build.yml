name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ================================================================
  # ANDROID
  # ================================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build apk
        run: flutter build apk --release --split-per-abi

      - name: build aab
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ================================================================
  # iOS
  # ================================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: pod install
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update
        continue-on-error: true

      - name: build simulator (debug)
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" | head -1)
          echo "Found: $APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      - name: build device (best-effort, no-codesign)
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

      - name: package ipa if available
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/
            rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ================================================================
  # WINDOWS
  # Flutter 3.22 vswhere hardcodes -version 16 (VS2019).
  # Fix: set FLUTTER_WINDOWS_VISUAL_STUDIO_VERSION=17 to tell
  # Flutter to search VS 2022, OR bypass flutter and call cmake+ninja.
  # ================================================================
  windows:
    name: Windows EXE
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      - name: enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        run: flutter pub get

      - name: setup msvc
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: install cmake and ninja
        shell: pwsh
        run: |
          choco install cmake --installargs "ADD_CMAKE_TO_PATH=System" -y --no-progress
          choco install ninja -y --no-progress
          cmake --version
          ninja --version

      - name: build windows via flutter
        shell: pwsh
        env:
          # Flutter 3.22 accepts this undocumented env to pick VS version
          # We also set CMAKE_GENERATOR so if cmake is called directly it uses Ninja
          CMAKE_GENERATOR: "Ninja"
        run: |
          # Patch: create a shim vswhere that returns VS2022 path
          # Flutter calls: vswhere.exe -format json -utf8 -latest -version 16 ...
          # We create a PowerShell script wrapper named vswhere.cmd
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = (& $vsWhere -latest -property installationPath) -replace '\\','/'
          Write-Host "VS2022 path: $vsPath"

          # Write fake output JSON to a temp file
          $fakeOutput = '[{"instanceId":"ci","installationPath":"' + $vsPath + '","installationVersion":"16.11.99.99","productId":"Microsoft.VisualStudio.Product.Enterprise","isComplete":true,"isLaunchable":true,"isPrerelease":false,"catalog":{"productLineVersion":"2019"},"properties":{}}]'
          $fakeOutput | Set-Content "$env:TEMP\fake_vs.json" -Encoding UTF8

          # Create shim directory before Flutter PATH lookup
          $shimDir = "$env:TEMP\vswhere_shim"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null

          # Write a .cmd shim that prints our fake JSON
          "@echo off`r`ntype `"$env:TEMP\fake_vs.json`"" | Set-Content "$shimDir\vswhere.exe.cmd" -Encoding ASCII

          # Copy real vswhere to shim dir so .exe exists (Flutter checks via full path)
          Copy-Item $vsWhere "$shimDir\vswhere_real.exe"

          # Override PATH so shim dir comes first
          # BUT Flutter uses the hardcoded path to vswhere.exe, not PATH lookup.
          # So we must copy our shim AS vswhere.exe in the same location.
          # Actually Flutter uses: ${env:ProgramFiles(x86)}\...\vswhere.exe directly.
          # Safest approach: directly call cmake bypassing Flutter detection.

          # Run flutter build — if VS detection fails, we catch and build manually
          $flutterOk = $false
          try {
            flutter build windows --release 2>&1 | Tee-Object -Variable flutterOut
            $flutterOk = $true
          } catch {
            Write-Host "flutter build failed, trying direct cmake..."
          }

          if (-not $flutterOk) {
            Write-Host "Falling back to direct CMake build..."
            # Make sure pub-generated files exist
            flutter pub get

            # Add VC tools to cmake prefix
            $vcToolsPath = & $vsWhere -latest -find "VC\Tools\MSVC\*\bin\Hostx64\x64" 2>$null | Select-Object -Last 1
            if ($vcToolsPath) {
              $env:PATH = "$vcToolsPath;$env:PATH"
            }

            New-Item -Force -ItemType Directory -Path "build\windows\x64" | Out-Null
            cmake -S windows -B build\windows\x64 `
              -G "Ninja" `
              -DCMAKE_BUILD_TYPE=Release `
              -DFLUTTER_TARGET_PLATFORM=windows-x64 `
              -DCMAKE_C_COMPILER=cl `
              -DCMAKE_CXX_COMPILER=cl `
              -DCMAKE_MAKE_PROGRAM=ninja

            cmake --build build\windows\x64 --config Release --parallel
          }

      - name: find and zip output
        shell: pwsh
        run: |
          $candidates = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release",
            "build\windows\x64\Release"
          )
          $src = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $src) {
            Write-Host "Scanning for exe files..."
            Get-ChildItem -Recurse -Include "*.exe" build | Select-Object FullName
            exit 1
          }
          Write-Host "Zipping from: $src"
          Get-ChildItem $src | Select-Object Name, Length
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force
          Write-Host "Done: $(Get-Item CloudGram-Windows.zip | Select-Object -ExpandProperty Length) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ================================================================
  # RELEASE
  # ================================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: compute tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: list artifacts
        run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — Unlimited Cloud Storage via Telegram

            | Platform | File |
            |----------|------|
            | Android | app-arm64-v8a-release.apk |
            | iOS Simulator | CloudGram-iOS-Simulator.zip |
            | iOS Device | CloudGram-iOS-Device.ipa |
            | Windows | CloudGram-Windows.zip |
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
