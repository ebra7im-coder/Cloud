name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ============================================================
  # ANDROID APK
  # ============================================================
  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: build APK
        run: flutter build apk --release --split-per-abi

      - name: build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ============================================================
  # iOS
  # ============================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: pod install
        run: |
          cd ios && rm -f Podfile.lock
          pod install --repo-update 2>&1 || true

      - name: build iOS simulator debug
        run: flutter build ios --simulator --debug --no-codesign

      - name: zip simulator app
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "App: $APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app

      - name: build iOS device (best-effort)
        run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

      - name: package IPA
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/
            rm -rf Payload
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # WINDOWS
  # ============================================================
  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: |
          mkdir -Force assets/icons
          mkdir -Force assets/images

      - name: build Windows Release
        run: flutter build windows --release

      - name: zip Windows build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath CloudGram-Windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows-x64.zip
          retention-days: 30

  # ============================================================
  # LINUX
  # ============================================================
  linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: create asset dirs
        run: mkdir -p assets/icons assets/images

      - name: build Linux Release
        run: flutter build linux --release

      - name: zip Linux build
        run: |
          tar -czf CloudGram-Linux-x64.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: CloudGram-Linux-x64.tar.gz
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows, linux]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: compute tag
        id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: list artifacts
        run: find artifacts/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## ☁️ CloudGram — تخزين سحابي لا محدود وعابر للمنصات

            | المنصة | الملف | ملاحظة |
            |--------|-------|--------|
            | 🤖 Android | `app-arm64-v8a-release.apk` | ✅ نسخة الموبايل الموصى بها |
            | 🤖 Android | `app-armeabi-v7a-release.apk` | الأجهزة القديمة |
            | 🍎 iOS Simulator | `CloudGram-iOS-Simulator.zip` | للمحاكي |
            | 🍎 iOS Device | `CloudGram-iOS-Device.ipa` | AltStore / Sideloadly |
            | 💻 Windows | `CloudGram-Windows-x64.zip` | نسخة نظام ويندوز |
            | 🐧 Linux | `CloudGram-Linux-x64.tar.gz` | نسخة نظام لينكس |

            > بُني تلقائياً بواسطة GitHub Actions — Flutter 3.27.4
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
