name: CloudGram CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ============================================================
  # ANDROID  (working)
  # ============================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: mkdir -p assets/icons assets/images
      - run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
      - run: flutter build apk --release --split-per-abi
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ============================================================
  # iOS  (working)
  # ============================================================
  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: mkdir -p assets/icons assets/images
      - run: |
          cd ios && rm -f Podfile.lock
          pod install --repo-update 2>&1 || true
      - run: flutter build ios --simulator --debug --no-codesign
      - run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/CloudGram-iOS-Simulator.zip" Runner.app
      - run: |
          flutter build ios --release --no-codesign \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" || true
      - run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mkdir Payload && cp -r build/ios/iphoneos/Runner.app Payload/
            zip -r CloudGram-iOS-Device.ipa Payload/ && rm -rf Payload
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            CloudGram-iOS-Simulator.zip
            CloudGram-iOS-Device.ipa
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # WINDOWS EXE
  # Strategy (proven working pieces):
  #  1. flutter create --platforms=windows  → proper CMakeLists.txt
  #  2. flutter pub get                     → plugin symlinks in ephemeral/
  #  3. flutter precache --windows          → engine DLLs in cache
  #  4. Copy engine DLLs to ephemeral/      → flutter_windows.dll etc.
  #  5. Patch flutter_tools dart source     → Ninja generator, no -A flag
  #  6. Delete snapshot+.dart_tool          → force JIT from patched source
  #  7. cmake -G Ninja                      → configure (no flutter wrapper)
  #  8. Patch build.ninja                   → fix /wd"4100" → /wd4100
  #  9. flutter assemble                    → generate AOT + assets
  # 10. ninja build                         → compile
  # ============================================================
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: enable-windows-desktop
        run: flutter config --enable-windows-desktop

      - name: pub-get
        run: flutter pub get

      - name: create-asset-dirs
        shell: pwsh
        run: New-Item -Force -ItemType Directory assets\icons, assets\images | Out-Null

      - name: setup-msvc
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: setup-windows-platform
        shell: pwsh
        run: |
          Set-StrictMode -Off

          # Step 1: generate windows/ via flutter create
          flutter create --platforms=windows --org com.cloudgram . 2>&1 |
            Where-Object { $_ -match 'windows' } | ForEach-Object { Write-Host $_ }
          Write-Host "windows/ created"

          # Step 2: pub get to generate plugin symlinks
          flutter pub get
          Write-Host "pub get done"

          # Step 3: precache engine
          flutter precache --windows
          Write-Host "engine precached"

          # Step 4: copy engine to ephemeral
          $ep = "windows\flutter\ephemeral"
          New-Item -Force -ItemType Directory $ep | Out-Null
          $edirs = @(
            "$env:FLUTTER_ROOT\bin\cache\artifacts\engine\windows-x64-release",
            "$env:FLUTTER_ROOT\bin\cache\artifacts\engine\windows-x64"
          )
          foreach ($ed in $edirs) {
            if (Test-Path $ed) {
              Copy-Item "$ed\*" $ep -Force -ErrorAction SilentlyContinue
              Write-Host "Copied engine from $ed"
              break
            }
          }
          if (Test-Path "$ep\flutter_windows.dll.lib") {
            Write-Host "flutter_windows.dll.lib OK"
          } else {
            Write-Host "flutter_windows.dll.lib missing - will be generated by assemble"
          }

          # Step 5: patch flutter_tools dart source
          $lib = "$env:FLUTTER_ROOT\packages\flutter_tools\lib\src\windows"

          # visual_studio.dart: fallback to Ninja for VS18 (unknown version)
          $vsf = "$lib\visual_studio.dart"
          $c = Get-Content $vsf -Raw -Encoding UTF8
          $c = $c -replace "_  => 'Visual Studio 16 2019'", "_  => 'Ninja'"
          Set-Content $vsf $c -Encoding UTF8 -NoNewline
          Write-Host "patched visual_studio.dart"

          # build_windows.dart: remove -A/arch and INSTALL target
          $bwf = "$lib\build_windows.dart"
          $lines = Get-Content $bwf
          $out = [System.Collections.Generic.List[string]]::new()
          $skipNext = $false
          foreach ($line in $lines) {
            if ($line.TrimEnd() -eq "        '-A',") { $skipNext = $true; continue }
            if ($skipNext -and $line.TrimEnd() -match "getCmakeWindowsArch") { $skipNext = $false; continue }
            if ($line.TrimEnd() -eq "          ...<String>['--target', 'INSTALL'],") { continue }
            $out.Add($line)
          }
          Set-Content $bwf $out -Encoding UTF8
          Write-Host "patched build_windows.dart"

          # Step 6: wipe snapshot so Flutter JIT-recompiles from patched source
          $kills = @(
            "$env:FLUTTER_ROOT\bin\cache\flutter_tools.snapshot",
            "$env:FLUTTER_ROOT\bin\cache\flutter_tools.stamp",
            "$env:FLUTTER_ROOT\packages\flutter_tools\.dart_tool"
          )
          foreach ($k in $kills) {
            if (Test-Path $k) { Remove-Item $k -Recurse -Force; Write-Host "deleted $k" }
          }
          Write-Host "Setup complete"

      - name: cmake-configure
        shell: pwsh
        run: |
          Set-StrictMode -Off
          $vsPath = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          $cmake  = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe"
          $ninja  = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja\ninja.exe"
          $env:PATH = [IO.Path]::GetDirectoryName($ninja) + ";" + $env:PATH

          Write-Host "cmake: $cmake"
          Write-Host "ninja: $ninja"

          $buildDir = "build\windows\x64"
          New-Item -Force -ItemType Directory $buildDir | Out-Null

          & $cmake -S windows -B $buildDir `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DFLUTTER_TARGET_PLATFORM=windows-x64 `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_MAKE_PROGRAM="$ninja"

          if ($LASTEXITCODE -ne 0) { Write-Error "cmake failed ($LASTEXITCODE)"; exit 1 }
          Write-Host "cmake configure OK"

          # Patch build.ninja files: /wd"NNNN" -> /wdNNNN
          Get-ChildItem -Recurse $buildDir -Filter "*.ninja" | ForEach-Object {
            $t = Get-Content $_.FullName -Raw -Encoding UTF8
            if ($t -match '/wd\\"') {
              $t2 = [regex]::Replace($t, '/wd\\"(\d+)\\"', '/wd$1')
              Set-Content $_.FullName $t2 -Encoding UTF8 -NoNewline
              Write-Host "patched $($_.Name)"
            }
          }
          Write-Host "ninja files patched"

      - name: flutter-assemble
        shell: pwsh
        run: |
          Set-StrictMode -Off
          flutter assemble `
            "-dTargetPlatform=windows-x64" `
            "-dBuildMode=release" `
            "-dTargetFile=lib/main.dart" `
            "-dDartObfuscation=false" `
            windows_aot_bundle_release_assets 2>&1 | Write-Host
          Write-Host "assemble done (exit $LASTEXITCODE)"

      - name: ninja-build
        shell: pwsh
        run: |
          Set-StrictMode -Off
          $vsPath = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          $ninja  = "$vsPath\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja\ninja.exe"
          $env:PATH = [IO.Path]::GetDirectoryName($ninja) + ";" + $env:PATH

          Push-Location "build\windows\x64"
          & $ninja -j 4 2>&1 | Write-Host
          $code = $LASTEXITCODE
          Pop-Location
          if ($code -ne 0) { Write-Error "ninja failed ($code)"; exit 1 }
          Write-Host "ninja build SUCCESS"

      - name: zip-output
        shell: pwsh
        run: |
          Set-StrictMode -Off
          $src = @(
            "build\windows\x64\runner\Release",
            "build\windows\runner\Release",
            "build\windows\x64\cloudgram"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $src) {
            Write-Host "Searching for exe..."
            Get-ChildItem -Recurse build\windows -Filter "*.exe" |
              Where-Object { $_.Name -ne "cmake.exe" } |
              Select-Object FullName | Write-Host
            exit 1
          }
          Write-Host "Zipping from: $src"
          Compress-Archive -Path "$src\*" -DestinationPath "CloudGram-Windows.zip" -Force
          Write-Host "$([math]::Round((Get-Item 'CloudGram-Windows.zip').Length/1MB,1)) MB"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: CloudGram-Windows.zip
          retention-days: 30

  # ============================================================
  # RELEASE
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - id: tag
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=v${VER}" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
      - run: find artifacts/ -type f | sort
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CloudGram ${{ steps.tag.outputs.ver }}"
          body: |
            ## CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            | المنصة | الملف |
            |--------|-------|
            | 🤖 Android | app-arm64-v8a-release.apk |
            | 🍎 iOS Simulator | CloudGram-iOS-Simulator.zip |
            | 🍎 iOS Device | CloudGram-iOS-Device.ipa |
            | 🪟 Windows | CloudGram-Windows.zip |

            > Flutter 3.27.4 — GitHub Actions
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
