name: 🚀 CloudGram Build (APK • iOS • Windows EXE)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

# ─────────────────────────────────────────────────────────────────
# 1️⃣  Android APK
# ─────────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🔨 Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: 🔨 Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: 🏷️ Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📢 APK build summary
        run: |
          echo "## ✅ Android Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in build/app/outputs/flutter-apk/*.apk; do
            echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done

# ─────────────────────────────────────────────────────────────────
# 2️⃣  iOS IPA
# ─────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        continue-on-error: true

      - name: 🔨 Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: 📦 Package IPA (ad-hoc unsigned)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r CloudGram.ipa Payload/
          rm -rf Payload

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: CloudGram.ipa
          retention-days: 30

      - name: 📢 iOS build summary
        run: |
          echo "## ✅ iOS Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| CloudGram.ipa | $(du -sh CloudGram.ipa | cut -f1) |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────
# 3️⃣  Windows EXE
# ─────────────────────────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: 🔧 Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔨 Build Windows EXE
        run: flutter build windows --release

      - name: 📦 Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "CloudGram-Windows.zip"

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: CloudGram-Windows.zip
          retention-days: 30

      - name: 📢 Windows build summary
        shell: pwsh
        run: |
          $size = (Get-Item "CloudGram-Windows.zip").Length / 1MB
          echo "## ✅ Windows Build Successful" >> $env:GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $env:GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| CloudGram-Windows.zip | $([math]::Round($size,1)) MB |" >> $env:GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────
# 4️⃣  Auto Release (فقط عند push على main)
# ─────────────────────────────────────────────────────────────────
  release:
    name: 🏷️ Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-windows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 🏷️ Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: 🗂 List downloaded artifacts
        run: find artifacts/ -type f | sort

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "☁️ CloudGram ${{ steps.version.outputs.version }}"
          body: |
            ## ☁️ CloudGram — تخزين سحابي لا محدود عبر تيليجرام

            ### 📥 التحميل

            | المنصة | الملف |
            |--------|-------|
            | 🤖 Android | `app-arm64-v8a-release.apk` (موصى به) |
            | 🤖 Android | `app-armeabi-v7a-release.apk` (أجهزة قديمة) |
            | 🤖 Android | `app-x86_64-release.apk` (محاكي) |
            | 🍎 iOS | `CloudGram.ipa` (يحتاج Sideloading) |
            | 🪟 Windows | `CloudGram-Windows.zip` (فك الضغط وشغّل) |

            ### ✨ المميزات
            - 📤 رفع أي نوع ملف (صور • فيديو • موسيقى • مستندات)
            - ☁️ تخزين لا محدود عبر Telegram Bot API
            - 🎥 مشغّل فيديو مدمج
            - 🎵 مشغّل موسيقى مدمج
            - 🔍 بحث سريع
            - 🌙 Dark Theme

            ### 🛠 كيفية التثبيت على Android
            1. حمّل ملف `arm64-v8a` إذا كان جهازك حديثاً
            2. فعّل **"تثبيت من مصادر غير معروفة"** في الإعدادات
            3. افتح الملف وثبّت

            ---
            > 🤖 تم البناء تلقائياً بواسطة GitHub Actions
          files: |
            artifacts/android-apks/*.apk
            artifacts/android-apks/*.aab
            artifacts/ios-ipa/CloudGram.ipa
            artifacts/windows-exe/CloudGram-Windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
