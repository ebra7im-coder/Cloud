name: cloudgram
description: CloudGram - Unlimited Cloud Storage via Telegram & Desktop Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Fundamentals & Core ────────────────────────────────────────
  get: ^4.6.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  http: ^1.2.0
  dio: ^5.4.0
  path_provider: ^2.1.4
  path: ^1.9.0
  mime: ^1.0.5
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.0

  # ── Mobile-Specific / Media ────────────────────────────────────
  image_picker: ^1.1.2
  permission_handler: ^11.3.0
  video_player: ^2.9.2
  just_audio: ^0.9.40
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  open_file: ^3.3.2
  connectivity_plus: ^6.1.1
  cupertino_icons: ^1.0.8

  # ── UI & Design ────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.0
  iconsax: ^0.0.8
  flutter_native_splash: ^2.3.10

  # ── Desktop & Advanced ──────────────────────────────────────────
  window_manager: ^0.3.8
  desktop_drop: ^0.4.4
  file_picker: ^8.0.0
  open_filex: ^4.3.4
  share_plus: ^10.0.0
  tray_manager: ^0.2.2
  hotkey_manager: ^0.1.9
  platform_alert: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  msix: ^3.16.6

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

# Windows MSix Configurations
msix_config:
  display_name: CloudVault
  publisher_display_name: Ahmed
  identity_name: com.cloudvault.app
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_icon.png

# Linux Configurations
linux:
  bundle:
    icon: assets/icons/app_icon.png

# App Launcher Icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icons/foreground.png"
