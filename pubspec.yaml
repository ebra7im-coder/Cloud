name: cloudgram
description: CloudGram - Unlimited Cloud Storage via Telegram
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Telegram / Network ────────────────────────────────────────
  http: ^1.2.0
  dio: ^5.4.0

  # ── File Picking ──────────────────────────────────────────────
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.0

  # ── Media Playback ────────────────────────────────────────────
  video_player: ^2.9.2
  just_audio: ^0.9.40

  # ── UI ────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  iconsax: ^0.0.8
  flutter_screenutil: ^5.9.0

  # ── State / Storage ───────────────────────────────────────────
  get: ^4.6.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0

  # ── Utils ─────────────────────────────────────────────────────
  path_provider: ^2.1.4
  path: ^1.9.0
  mime: ^1.0.5
  intl: ^0.19.0
  open_file: ^3.3.2
  share_plus: ^10.0.0
  connectivity_plus: ^6.1.1
  uuid: ^4.5.1
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
